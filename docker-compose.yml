version: "3.8"

services:
  # ---- Tier 3: Database ----
  db:
    image: postgres:16-alpine
    container_name: pizzeria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pizzeria_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-pizzeria_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # auto-runs once on first container start (empty data dir)
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pizzeria_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Tier 2: Backend API ----
  api:
    build: ./server
    container_name: pizzeria-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: http://3.24.192.178:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-pizzeria_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-pizzeria_db}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-"Nithish Pizzeria <no-reply@nithishpizzeria.com>"}
    ports:
      - "5000:5000"

  # ---- Tier 1: Frontend ----
  web:
    build: .
    container_name: pizzeria-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://3.24.192.178:5000
    ports:
      - "3000:3000"

volumes:
  pgdata:
