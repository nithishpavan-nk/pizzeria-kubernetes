apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: pizzeria

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: nithishpavan/pizzeria-web:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: REACT_APP_API_URL
          value: "http://backend:5000"
